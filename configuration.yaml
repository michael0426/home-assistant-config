##############################
# Home Assistant Main Configuration
# Optimized with package-based organization
# See packages/ directory for component configurations
##############################

# Configure default setup
default_config:

# Home Assistant core configuration
homeassistant:
  name: Home
  latitude: !secret home_latitude
  longitude: !secret home_longitude
  unit_system: metric
  time_zone: Asia/Taipei
  customize: !include customize.yaml
  packages: !include_dir_named packages

# Frontend
frontend:
  extra_module_url:
    - /local/custom-lovelace/bar-card/bar-card.js

# Groups
group: !include groups.yaml

# Automations
automation: !include automations.yaml

# Scripts
script: !include scripts.yaml

# Scenes
scene: !include scenes.yaml

# HTTP Configuration
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.30.33.0/24
    - 172.30.32.0/24
    - 192.168.1.0/24
    - 10.0.0.0/24

# My Home Assistant
my:

# Zeroconf for local discovery
zeroconf:

# Cloud (optional - uncomment to enable)
# cloud:

#      {% if is_state('binary_sensor.garage_door', 'on') %}
#        open
#      {% else %}
#        closed
#      {% endif %}


- cover:
  - open_cover:
    - data:
        entity_id: switch.bathroom_cover_up
      action: switch.turn_on
    stop_cover:
    - data:
        entity_id: switch.bathroom_cover_stop
      action: switch.turn_on
    close_cover:
    - data:
        entity_id: switch.bathroom_cover_down
      action: switch.turn_on
    default_entity_id: cover.bathroom_cover
    name: Bathroom Cover 
    
- lock:
  - name: door
    optimistic: true
    lock:
    - target:
        entity_id:
        - switch.sonoff_10012e407e
      action: switch.turn_on
    unlock:
    - target:
        entity_id:
        - switch.sonoff_10012e407e
      action: switch.turn_on
    state: '{{ is_state(''switch.sonoff_10012e407e'', ''off'') }}' 


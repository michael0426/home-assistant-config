template:
- cover:
  - name: "Garage Door"
#    device_class: garage

    state: >
      {% if is_state('binary_sensor.garage_door', 'on') %}
        open
      {% else %}
        closed
      {% endif %}

    open_cover:
      service: switch.turn_on
      target:
        entity_id: switch.sonoff_10005b61f7_1

    close_cover:
      service: switch.turn_on
      target:
        entity_id: switch.sonoff_10005b61f7_3

    stop_cover:
      service: switch.turn_on
      target:
        entity_id: switch.sonoff_10005b61f7_2

    icon: >
      {% if is_state('cover.garage_door', 'open') %}
        mdi:garage-open-variant
      {% else %}
        mdi:garage-variant
      {% endif %}
#- sensor:
#  - name: "garage_cover"

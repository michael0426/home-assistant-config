  sequence:
  - data:
      command: Z6VXADMCAACXBgAAyAgAALERAABMIwAAPIwAAPR4AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA0ABAQEBAQABAAEBAQEBAAEAAAAAAQEBAAEBAQEAAAABBQJGAkYCRgJGAkAA==
      entity_id: remote.xiaomi_remote
    service: remote.send_command
air_purifier_off:
  alias: air purifier off
  sequence:
  - service: remote.send_command
    data:
      command: Z6VHAAwCAABcAgAArwYAAOsIAACmEQAA7SIAAMSfAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABFEBAgEBAQEBAgIBAgIBAgICAgEBAQEBAgEBAgICAgIBBgNQA=
      entity_id: remote.xiaomi_remote
  - service: input_boolean.turn_off
    data:
      entity_id: input_boolean.air_purifier_states
air_purifier_on:
  alias: air purifier on
  sequence:
  - service: remote.send_command
    data:
      command: Z6VHAAwCAABcAgAArwYAAOsIAACmEQAA7SIAAMSfAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABFEBAgEBAQEBAgIBAgIBAgICAgEBAQEBAgEBAgICAgIBBgNQA=
      entity_id: remote.xiaomi_remote
  - service: input_boolean.turn_on
    data:
      entity_id: input_boolean.air_purifier_states
  - delay:
      seconds: 5
air_purifier_fan_speed:
  alias: fan speed
  sequence:
  - data:
      command: Z6VHAAsCAAAuAgAAmgYAAMsIAACFEQAAASMAAMSfAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABFEBEhERAQEREhIBEhIREhIREhEBEREREhIRAgISEgIRFgNQE=
      entity_id: remote.xiaomi_remote
    service: remote.send_command
air_purifier_time:
  alias: time
  sequence:
  - data:
      command: Z6VHABECAABSAgAArgYAANEIAAChEQAA8CIAAMSfAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABFEBAgEBAQEBAgIBAgIBAgICAQEBAQEBAgECAgICAgIBBgNQA=
      entity_id: remote.xiaomi_remote
    service: remote.send_command
air_purifier_superspeed:
  alias: superspeed
  sequence:
  - data:
      command: Z6VLAC0CAACeBgAAywgAAIcRAAD8IgAAxJ8AADh2AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA0AAAQAAAAAAAQEAAQEAAQEAAAAAAAAAAQEBAQEBAQEABQJGAkAA==
      entity_id: remote.xiaomi_remote
    service: remote.send_command
smart_fan_1x_oscillating:
  alias: Smart Fan Oscillating
  sequence:
  - service: fan.oscillate
    target:
      entity_id: fan.xiaomi_smart_fan
    data:
      oscillating: '{{ oscillating }}'
  mode: single
smart_fan_1x_set_speed:
  alias: Smart Fan Set Speed
  sequence:
  - choose:
    - conditions:
      - condition: state
        entity_id: fan.xiaomi_smart_fan
        state: 'off'
      sequence:
      - service: homeassistant.turn_on
        target:
          entity_id: fan.xiaomi_smart_fan
    default: []
  - service: fan.set_percentage
    target:
      entity_id: fan.xiaomi_smart_fan
    data:
      percentage: '{{ percentage }}'
  mode: single
  
chiuchiu_fan_1x_oscillating:
  alias: Chiu Fan Oscillating
  sequence:
  - service: fan.oscillate
    target:
      entity_id: fan.qiu_qiu_feng_shan
    data:
      oscillating: '{{ oscillating }}'
  mode: single
chiuchiu_fan_1x_set_speed:
  alias: Chiu Fan Set Speed
  sequence:
  - choose:
    - conditions:
      - condition: state
        entity_id: fan.qiu_qiu_feng_shan
        state: 'off'
      sequence:
      - service: homeassistant.turn_on
        target:
          entity_id: fan.qiu_qiu_feng_shan
    default: []
  - service: fan.set_percentage
    target:
      entity_id: fan.qiu_qiu_feng_shan
    data:
      percentage: '{{ percentage }}'
  mode: single
  
